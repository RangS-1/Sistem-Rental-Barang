<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem-Rental-Barang</title>
    <!-- Font Awesome untuk Ikon Profesional -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Hubungkan ke file CSS login -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="container">
        <!-- Sisi Kiri: Area Gambar -->
        <div class="image-side">
            <!-- Background diatur di style.css -->
        </div>

        <!-- Sisi Kanan: Form Login -->
        <div class="form-side">
            <div class="form-wrapper">
                
                <div class="header">
                    <h1>Login</h1>
                    <p>Masuk ke Akunmu</p>
                </div>

                <!-- Form terhubung ke file PHP Anda -->
                <form method="post" action="php/login.php">
                    <!-- Input Username -->
                    <div class="input-group">
                        <label>Username</label>
                        <div class="input-container">
                            <span class="icon"><i class="fa-solid fa-user"></i></span>
                            <input type="text" name="username" placeholder="Masukkan username" required>
                        </div>
                    </div>

                    <!-- Input Password -->
                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-container">
                            <span class="icon"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" name="password" id="password" placeholder="Masukkan password" required>
                            <span class="toggle-password"><i class="fa-solid fa-eye"></i></span>
                        </div>
                    </div>

                    <hr class="divider">
                    <button type="submit" class="btn-primary">Login</button>
                    
                    <div class="footer-nav">
                        <p>Belum punya akun? <a href="index.html">Daftar di sini</a></p>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
